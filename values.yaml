replicaCount: 2

image:
  repository: ghcr.io/j26423397-byte/hello-k8s
  tag: "58ffe7e216acd5f0ef91bd4b0cd62bc2cb84616a"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: web.local

config:
  APP_NAME: advanced-web
  APP_MODE: auto-sync-test
secret:
  DB_PASSWORD: "1234"

pvc:
  enabled: true
  storage: 1Gi
  mountPath: /data

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi